<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Psico & Calm</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">
                    <img src="imagenes/logo.png" alt="Logo" class="logo-img">
                </a>
                <div class="texto-logo">
                    <span class="nombre-logo">Psico & Calm</span>
                </div>
            </div>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="servicios.html">Servicios</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="galería.html">Galería</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main class="contacto-container">
        <h1>Contacto</h1>
        <form class="formulario-contacto">
            <div class="campo">
                <label>Nombre</label>
                <input type="text" required placeholder="Tu nombre">
            </div>
            <div class="campo">
                <label>Email</label>
                <input type="email" required placeholder="tu@email.com">
            </div>
            <div class="campo">
                <label>Mensaje</label>
                <textarea rows="4" placeholder="¿En qué puedo ayudarte?"></textarea>
            </div>
            <button type="submit" class="btn-enviar">Enviar Mensaje</button>
        </form>
    </main>

    <footer>
        <p>Psico & Calm © 2026</p>
    </footer>
</body>
</html>
